name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: app:dist:win
            artifact: wiki-server-windows-x64
            path: release/*.exe
          - os: ubuntu-latest
            script: app:dist:linux
            artifact: wiki-server-linux-x64
            path: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true
      - run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
